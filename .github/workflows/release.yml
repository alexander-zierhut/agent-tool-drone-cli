name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token stored
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # Read the version from the BUILT WHEEL, not by importing the package:
      # `import dronecli` pulls in httpx/rich/agentcli, which this job does not
      # install. (The shared repo's first cut of this check died exactly there.)
      # Reading the artifact also validates the precise file being uploaded.
      - name: Tag must match the built version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          WHL=$(ls dist/*.whl)
          BUILT=$(basename "$WHL" | cut -d- -f2)
          TAG="${GITHUB_REF_NAME#v}"
          echo "built=$BUILT tag=$TAG  ($(basename "$WHL"))"
          [ "$BUILT" = "$TAG" ] || { echo "::error::tag v$TAG != built version $BUILT"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running a release is a normal thing to need: v0.1.0's Windows
          # binary failed, the fix meant moving the tag, and the re-run then died
          # on "File already exists" for a version that had published perfectly.
          # A red release for an artifact that is already correct trains people to
          # ignore red. Forgetting to bump is caught by the tag-vs-built-version
          # guard above, so nothing is silently swallowed here.
          skip-existing: true

      - name: Attach dists to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # Per-platform binaries attach independently, so a slow/failing runner never
  # blocks the others or the PyPI publish.
  binary:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  asset: drone-cli-linux-x86_64 }
          - { os: macos-latest,   asset: drone-cli-macos-arm64 }
          - { os: macos-13,       asset: drone-cli-macos-x86_64 }
          - { os: windows-latest, asset: drone-cli-windows-x86_64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[build]"
      - name: Build the single-file binary
        run: python scripts/build_binary.py --output "${{ matrix.asset }}"
      - name: Smoke-test it
        shell: bash
        run: ./dist/"${{ matrix.asset }}" --version
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
